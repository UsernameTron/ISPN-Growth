name: PR Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  roi-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: roi-calculator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest tests/ -v

  roi-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: roi-calculator/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: roi-calculator/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npx vitest run

  gcs-engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gcs-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        env:
          PYTHONPATH: .
        run: python -m pytest tests/ -v
