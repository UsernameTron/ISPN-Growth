services:
  backend:
    build:
      context: .
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - ENVIRONMENT=development
    networks:
      - app-network

  frontend:
    image: node:20
    working_dir: /frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/frontend
    command: npm run dev
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
